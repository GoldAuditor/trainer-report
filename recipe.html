<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Trainer Log">
<title>料理提案 | Trainer Log</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe6;--bg2:#ece6d8;--sf:#faf7f1;--sf2:#f0e9d8;
  --bd:#d5c9b4;--bd2:#bfb09a;
  --tx:#332b22;--tx2:#6a5c4c;--tx3:#9a8a76;
  --ac:#7b6249;--gn:#4d7a5c;--og:#a07040;--rd:#8b4848;
  --sh:rgba(80,60,40,.09);
  --r:14px;--rs:9px;
  --jp:'Zen Kaku Gothic New',sans-serif;
  --se:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--jp);padding:0 0 90px;font-size:15px}

.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:52px 18px 16px;position:sticky;top:0;z-index:50}
.hdr h1{font-family:var(--se);font-size:20px;color:var(--ac)}
.hdr p{font-size:11px;color:var(--tx3);margin-top:3px}

.wrap{padding:14px 14px 0}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 6px var(--sh)}
.ch{display:flex;align-items:center;gap:9px;padding:13px 15px;background:var(--sf2);border-bottom:1px solid var(--bd)}
.ci{font-size:16px;width:32px;height:32px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct{font-size:14px;font-weight:700;color:var(--tx);flex:1}
.cb{padding:15px}

label{display:block;font-size:11px;color:var(--tx3);letter-spacing:.4px;margin-bottom:5px;font-weight:500}
input[type=text],textarea,select{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);
  color:var(--tx);font-family:var(--jp);font-size:16px;padding:11px 12px;
  width:100%;-webkit-appearance:none;outline:none;
  transition:border-color .2s,background .2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--ac);background:var(--sf)}
textarea{resize:none;line-height:1.75}

.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}

/* Ingredient tags */
.tag-area{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:36px}
.tag{background:var(--sf2);border:1.5px solid var(--bd);border-radius:99px;color:var(--tx2);font-size:13px;padding:5px 12px;display:flex;align-items:center;gap:6px}
.tag .rm{cursor:pointer;color:var(--tx3);font-size:15px;line-height:1}
.tag .rm:hover{color:var(--rd)}
.tag-input-row{display:flex;gap:8px;margin-top:8px}
.tag-input-row input{flex:1}
.add-tag-btn{background:var(--ac);border:none;border-radius:var(--rs);color:#fff;cursor:pointer;font-family:var(--jp);font-size:14px;padding:11px 16px;white-space:nowrap;-webkit-appearance:none;flex-shrink:0}
.add-tag-btn:active{opacity:.8}

/* Options */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-btn{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rs);color:var(--tx2);cursor:pointer;font-family:var(--jp);font-size:13px;padding:10px 8px;text-align:center;-webkit-appearance:none;transition:all .15s}
.opt-btn.sel{background:var(--sf2);border-color:var(--ac);color:var(--ac);font-weight:700}

/* Generate */
.gen-btn{background:var(--ac);border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-family:var(--jp);font-size:16px;font-weight:700;padding:18px;width:100%;box-shadow:0 4px 14px rgba(120,95,70,.28);-webkit-appearance:none;letter-spacing:.3px;margin-top:4px}
.gen-btn:active{opacity:.85}
.gen-btn:disabled{opacity:.5}

/* Loading */
.loading{display:none;text-align:center;padding:30px;color:var(--tx3);font-size:13px}
.loading.show{display:block}
.dots-wrap{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Recipe results */
.recipe-list{margin-top:10px}
.recipe-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 6px var(--sh)}
.recipe-hdr{background:var(--sf2);border-bottom:1px solid var(--bd);padding:13px 15px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.recipe-num{background:var(--ac);color:#fff;border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.recipe-name{font-size:15px;font-weight:700;color:var(--tx);flex:1}
.recipe-pfc{font-size:11px;color:var(--tx3);margin-top:3px}
.recipe-badge{font-size:10px;background:#ddeedd;color:#2d5a2d;border-radius:99px;padding:3px 8px;white-space:nowrap;flex-shrink:0}
.recipe-body{padding:15px;display:none;border-top:1px solid var(--bd)}
.recipe-body.open{display:block}
.section-label{font-size:11px;color:var(--tx3);letter-spacing:.4px;font-weight:700;margin-bottom:8px;text-transform:uppercase}
.ing-list{list-style:none;margin-bottom:14px}
.ing-list li{font-size:14px;color:var(--tx2);padding:4px 0;border-bottom:1px solid var(--bg2);display:flex;align-items:center;gap:6px}
.ing-list li::before{content:'•';color:var(--ac);font-size:16px;flex-shrink:0}
.step-list{list-style:none}
.step-item{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.step-num{background:var(--ac);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-txt{font-size:14px;color:var(--tx);line-height:1.65}
.tip-box{background:var(--bg2);border-left:3px solid var(--gn);border-radius:0 var(--rs) var(--rs) 0;padding:10px 12px;margin-top:12px;font-size:13px;color:var(--tx2);line-height:1.65}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;text-decoration:none;color:var(--tx3);font-size:10px;letter-spacing:.3px;transition:color .15s}
.bnav a.active{color:var(--ac)}.bnav a .ico{font-size:20px}

@supports(padding-bottom:env(safe-area-inset-bottom)){
  body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .hdr{padding-top:max(52px,calc(44px + env(safe-area-inset-top)))}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>料理提案</h1>
  <p>冷蔵庫の食材からローファットレシピ</p>
</div>

<div class="wrap">

  <!-- Ingredients input -->
  <div class="card">
    <div class="ch">
      <div class="ci">🥦</div><div class="ct">冷蔵庫の食材</div>
    </div>
    <div class="cb">
      <label>食材を1つずつ追加してください</label>
      <div class="tag-input-row">
        <input type="text" id="ingInput" placeholder="例：鶏むね肉" inputmode="text" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault()}">
        <button class="add-tag-btn" onclick="addTag()">追加</button>
      </div>
      <div class="tag-area" id="tagArea"></div>
    </div>
  </div>

  <!-- Options -->
  <div class="card">
    <div class="ch">
      <div class="ci">⚙️</div><div class="ct">条件</div>
    </div>
    <div class="cb">
      <div class="field">
        <label>調理時間</label>
        <div class="opt-grid">
          <button class="opt-btn sel" onclick="selOpt(this,'time')">15分以内</button>
          <button class="opt-btn" onclick="selOpt(this,'time')">30分以内</button>
          <button class="opt-btn" onclick="selOpt(this,'time')">時間はかけてOK</button>
          <button class="opt-btn" onclick="selOpt(this,'time')">こだわらない</button>
        </div>
      </div>
      <div class="field" style="margin-top:13px">
        <label>食事の目的</label>
        <div class="opt-grid">
          <button class="opt-btn sel" onclick="selOpt(this,'goal')">減量優先</button>
          <button class="opt-btn" onclick="selOpt(this,'goal')">筋肉維持</button>
          <button class="opt-btn" onclick="selOpt(this,'goal')">バランス重視</button>
          <button class="opt-btn" onclick="selOpt(this,'goal')">腸活も意識</button>
        </div>
      </div>
      <div class="field" style="margin-top:13px">
        <label>その他リクエスト（任意）</label>
        <input type="text" id="extraReq" placeholder="例：簡単に作れるもの、夜食向け">
      </div>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="getRecipes()">🍳 レシピを提案してもらう</button>

  <div class="loading" id="loading">
    <div class="dots-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    AIがローファット向けレシピを考えています…
  </div>

  <div class="recipe-list" id="recipeList"></div>

</div>

<div class="bnav">
  <a href="index.html"><span class="ico">📋</span>報告書</a>
  <a href="analysis.html"><span class="ico">📈</span>分析</a>
  <a href="recipe.html" class="active"><span class="ico">🍳</span>料理提案</a>
</div>

<script>
let tags=[];

function addTag(){
  const inp=document.getElementById('ingInput');
  const val=inp.value.trim();
  if(!val||tags.includes(val))return;
  tags.push(val);
  renderTags();
  inp.value='';
  inp.focus();
}

function removeTag(val){
  tags=tags.filter(t=>t!==val);
  renderTags();
}

function renderTags(){
  const area=document.getElementById('tagArea');
  area.innerHTML=tags.map(t=>`<div class="tag">${t}<span class="rm" onclick="removeTag('${t}')">✕</span></div>`).join('');
}

const optSel={time:'15分以内',goal:'減量優先'};
function selOpt(btn,group){
  btn.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  optSel[group]=btn.textContent;
}

async function getRecipes(){
  if(!tags.length){alert('食材を1つ以上追加してください');return;}
  const btn=document.getElementById('genBtn');
  btn.disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('recipeList').innerHTML='';

  const extra=document.getElementById('extraReq').value.trim();
  const prompt=`あなたはローファットダイエット（高たんぱく・低脂質・中炭水化物）の専門栄養士です。
以下の食材を使って夕食のレシピを3品提案してください。

食材：${tags.join('、')}
調理時間：${optSel.time}
目的：${optSel.goal}
${extra?'その他：'+extra:''}

ローファットダイエットのルール：
- たんぱく質を多く（目安130g以上/日）
- 脂質を抑える（目安50g以下/日）
- 良質な油のみ使用
- 腸活のため食物繊維も意識

必ず以下のJSON形式のみで返答してください。マークダウンや説明文は不要です：
[
  {
    "name": "料理名",
    "time": "調理時間（分）",
    "kcal": 推定カロリー(数値),
    "protein": 推定たんぱく質g(数値),
    "fat": 推定脂質g(数値),
    "carb": 推定炭水化物g(数値),
    "lowfat_point": "ローファット的に良い点（1文）",
    "ingredients": ["食材1 分量", "食材2 分量"],
    "steps": ["手順1", "手順2", "手順3"],
    "tip": "調理のコツや注意点（1文）"
  }
]`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||'';
    const clean=txt.replace(/```json|```/g,'').trim();
    const recipes=JSON.parse(clean);
    renderRecipes(recipes);
  }catch(e){
    document.getElementById('recipeList').innerHTML=`<div style="text-align:center;padding:20px;color:var(--rd);font-size:13px">⚠️ 提案の取得に失敗しました<br>もう一度お試しください</div>`;
  }finally{
    document.getElementById('loading').classList.remove('show');
    btn.disabled=false;
  }
}

function renderRecipes(recipes){
  const list=document.getElementById('recipeList');
  list.innerHTML=recipes.map((r,i)=>`
    <div class="recipe-card">
      <div class="recipe-hdr" onclick="toggleRecipe(this)">
        <div class="recipe-num">${i+1}</div>
        <div style="flex:1">
          <div class="recipe-name">${r.name}</div>
          <div class="recipe-pfc">約${r.kcal}kcal　P:${r.protein}g　F:${r.fat}g　C:${r.carb}g　⏱${r.time}分</div>
        </div>
        <div class="recipe-badge">✓ ローファット</div>
      </div>
      <div class="recipe-body">
        <div style="background:#eef3ee;border-radius:var(--rs);padding:9px 12px;margin-bottom:14px;font-size:13px;color:#2d5a2d">🌿 ${r.lowfat_point}</div>
        <div class="section-label">材料</div>
        <ul class="ing-list">${r.ingredients.map(ing=>`<li>${ing}</li>`).join('')}</ul>
        <div class="section-label">作り方</div>
        <ol class="step-list">${r.steps.map((s,j)=>`<div class="step-item"><div class="step-num">${j+1}</div><div class="step-txt">${s}</div></div>`).join('')}</ol>
        ${r.tip?`<div class="tip-box">💡 ${r.tip}</div>`:''}
      </div>
    </div>
  `).join('');
}

function toggleRecipe(hdr){
  hdr.nextElementSibling.classList.toggle('open');
}
</script>
</body>
</html>
